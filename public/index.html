<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wurq Community</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: #f8fafc;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 32rem;
    }
    h1 { margin: 0 0 0.5rem; font-size: 2.25rem; letter-spacing: -0.02em; }
    p { margin: 0.25rem 0; color: #cbd5e1; line-height: 1.5; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.8rem;
      background: #22c55e1a;
      color: #4ade80;
      border: 1px solid #22c55e33;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Wurq Community</h1>
    <p>This is a deploy-ready static demo app.</p>
    <p>Replace this <code>public/index.html</code> with your real content.</p>
    <span class="badge">● Server is up</span>
  </main>
</body>
</html>
