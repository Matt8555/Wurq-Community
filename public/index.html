<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wurq Community</title>
  <style>
    :root {
      --bg:        #0b0d0a;   /* near-black */
      --surface:   rgba(255, 255, 255, 0.04);
      --surface-2: rgba(255, 255, 255, 0.06);
      --border:    rgba(255, 255, 255, 0.10);
      --chalk:     #ecebe1;   /* chalk / off-white */
      --muted:     #9a9c91;
      --acid:      #c6ff00;   /* acid green */
      --acid-dim:  rgba(198, 255, 0, 0.14);
      --danger:    #ff6b6b;
      --radius:    16px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(120% 80% at 50% -10%, #15180f 0%, var(--bg) 55%);
      color: var(--chalk);
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Phone-sized frame */
    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      padding: env(safe-area-inset-top) 0 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 10px;
    }
    .brand {
      font-weight: 800;
      letter-spacing: 0.18em;
      font-size: 0.95rem;
      text-transform: uppercase;
    }
    .brand .dot { color: var(--acid); }
    .topbar .screen-name {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .content { flex: 1; padding: 8px 20px 96px; }

    h1.title {
      font-size: 1.6rem;
      letter-spacing: -0.01em;
      margin: 12px 0 4px;
    }
    p.subtitle { margin: 0 0 22px; color: var(--muted); font-size: 0.9rem; line-height: 1.45; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    /* Avatar */
    .avatar-row { display: flex; align-items: center; gap: 16px; }
    .avatar {
      width: 84px; height: 84px; border-radius: 50%;
      background: var(--surface-2);
      border: 2px solid var(--border);
      object-fit: cover;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1.7rem; font-weight: 700;
      overflow: hidden; flex: none;
    }
    .avatar.has-img { border-color: var(--acid); }
    .avatar-actions .upload-btn {
      display: inline-block;
      font-size: 0.8rem; font-weight: 600;
      color: var(--acid);
      border: 1px solid var(--acid);
      background: transparent;
      padding: 7px 14px; border-radius: 999px; cursor: pointer;
    }
    .avatar-actions .hint { display: block; margin-top: 6px; font-size: 0.72rem; color: var(--muted); }
    input[type="file"] { display: none; }

    label.field { display: block; margin-top: 16px; }
    label.field .lbl {
      display: block;
      font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }
    input[type="text"], input[type="email"], select, textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--chalk);
      padding: 13px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
    }
    textarea { resize: vertical; min-height: 72px; }
    input:focus, select:focus, textarea:focus { border-color: var(--acid); }
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239a9c91' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }

    /* Prominent gym/box field */
    .field-gym .lbl { color: var(--acid); }
    .field-gym input {
      border-color: var(--acid);
      background: var(--acid-dim);
      font-size: 1.05rem;
      font-weight: 600;
    }

    /* Units toggle */
    .toggle { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 4px; }
    .toggle button {
      border: none; background: transparent; color: var(--muted);
      padding: 8px 22px; border-radius: 999px; cursor: pointer;
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em;
    }
    .toggle button.active { background: var(--acid); color: #10130a; }

    .btn-primary {
      width: 100%;
      margin-top: 22px;
      background: var(--acid);
      color: #10130a;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.55; cursor: default; }

    .link { background: none; border: none; color: var(--muted); font-size: 0.78rem; cursor: pointer; text-decoration: underline; padding: 0; }
    .center { text-align: center; }

    .error { color: var(--danger); font-size: 0.82rem; margin-top: 10px; min-height: 1em; }

    /* Saved toast */
    .toast {
      position: fixed; left: 50%; bottom: 86px;
      transform: translate(-50%, 20px);
      background: var(--acid); color: #10130a;
      font-weight: 700; font-size: 0.85rem;
      padding: 11px 20px; border-radius: 999px;
      opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* Bottom nav (phone) */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      display: flex; justify-content: space-around;
      background: rgba(10, 12, 8, 0.92);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      backdrop-filter: blur(8px);
    }
    .nav a {
      color: var(--muted); text-decoration: none; font-size: 0.6rem;
      letter-spacing: 0.04em; text-transform: uppercase; text-align: center;
      flex: 1;
    }
    .nav a.active { color: var(--acid); }
    .nav a .ico { display: block; font-size: 1.05rem; margin-bottom: 3px; }

    /* WOD / Log screen */
    .wod-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .wod-name { font-size: 1.5rem; font-weight: 800; margin: 0; }
    .type-badge {
      font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--acid); border: 1px solid var(--acid); border-radius: 999px;
      padding: 4px 10px; white-space: nowrap;
    }
    .wod-date { color: var(--muted); font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase; margin: 4px 0 10px; }
    .wod-desc { color: var(--chalk); font-size: 0.95rem; line-height: 1.5; margin: 0; }

    .range-row { display: flex; align-items: center; gap: 12px; }
    input[type="range"] { flex: 1; accent-color: var(--acid); }
    .range-val { min-width: 3.2em; text-align: right; font-weight: 700; color: var(--acid); }

    /* Big score reveal after logging */
    .score-reveal { text-align: center; padding: 8px 0 4px; }
    .score-reveal .num { font-size: 3rem; font-weight: 800; color: var(--acid); line-height: 1; }
    .score-reveal .cap { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 6px; }

    /* Leaderboard */
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); margin-bottom: 8px;
    }
    .lb-row.me { border-color: var(--acid); background: var(--acid-dim); }
    .lb-rank { width: 1.6em; text-align: center; font-weight: 800; color: var(--muted); font-size: 0.95rem; flex: none; }
    .lb-row.me .lb-rank { color: var(--acid); }
    .lb-main { flex: 1; min-width: 0; }
    .lb-name { font-weight: 700; font-size: 0.98rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-sub { color: var(--muted); font-size: 0.76rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-score { text-align: right; flex: none; }
    .lb-score .s { font-weight: 800; color: var(--acid); font-size: 1.05rem; }
    .lb-score .t { color: var(--muted); font-size: 0.72rem; }

    .empty { text-align: center; color: var(--muted); padding: 28px 10px; line-height: 1.5; }

    /* Sub-tabs (My Box / Box vs Box) */
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tabs button {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 10px; padding: 10px; cursor: pointer;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.04em;
    }
    .tabs button.active { background: var(--acid); color: #10130a; border-color: var(--acid); }

    /* Box-vs-box rows */
    .box-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); margin-bottom: 8px;
    }
    .box-row.mine { border-color: var(--acid); background: var(--acid-dim); }
    .box-rank { width: 1.6em; text-align: center; font-weight: 800; color: var(--muted); flex: none; }
    .box-main { flex: 1; min-width: 0; }
    .box-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .box-breakdown { color: var(--muted); font-size: 0.74rem; margin-top: 3px; }
    .box-breakdown b { color: var(--chalk); font-weight: 600; }
    .box-score { font-weight: 800; color: var(--acid); font-size: 1.2rem; flex: none; }

    /* Feed */
    .feed-item {
      display: flex; gap: 12px; padding: 14px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); margin-bottom: 8px;
    }
    .feed-av {
      width: 40px; height: 40px; border-radius: 50%; flex: none;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--muted); font-size: 0.85rem; overflow: hidden;
    }
    .feed-body { flex: 1; min-width: 0; }
    .feed-text { font-size: 0.9rem; line-height: 1.4; }
    .feed-text b { font-weight: 700; }
    .feed-text .accent { color: var(--acid); font-weight: 700; }
    .feed-badge { color: var(--acid); }
    .feed-meta { display: flex; align-items: center; gap: 14px; margin-top: 8px; }
    .feed-time { color: var(--muted); font-size: 0.72rem; }
    .kudos {
      background: var(--surface-2); border: 1px solid var(--border); color: var(--chalk);
      border-radius: 999px; padding: 5px 12px; cursor: pointer; font-size: 0.78rem; font-weight: 600;
    }
    .kudos:hover { border-color: var(--acid); }
    .kudos.kudosed { background: var(--acid-dim); border-color: var(--acid); color: var(--acid); }

    /* Score reveal animation */
    .score-reveal .num { animation: pop .5s cubic-bezier(.18,.9,.3,1.3) both; }
    @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .badge-unlock {
      margin-top: 14px; padding: 14px; border-radius: 12px;
      background: var(--acid-dim); border: 1px solid var(--acid);
      animation: pop .5s .2s cubic-bezier(.18,.9,.3,1.3) both;
    }
    .badge-unlock .bu-title { color: var(--acid); font-weight: 800; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; }
    .badge-unlock .bu-name { font-weight: 700; margin-top: 4px; }
    .badge-unlock .bu-desc { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

    /* ── Community (Circle.so embed mock) ─────────────────────────────────── */
    /* A subtle strip signalling the embedded Circle space, kept on-brand so the
       transition from native tabs feels seamless. */
    .circle-strip {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; margin-bottom: 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    }
    .circle-strip .left { display: flex; align-items: center; gap: 9px; }
    .circle-mark {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--acid);
      box-shadow: inset 0 0 0 2px var(--bg);
      flex: none;
    }
    .circle-strip .label { font-size: 0.78rem; color: var(--chalk); font-weight: 600; }
    .circle-strip .label .by { color: var(--muted); font-weight: 400; }
    .circle-strip .live {
      font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--acid); border: 1px solid var(--acid); border-radius: 999px; padding: 3px 8px;
    }

    /* Space selector chips (Circle spaces) */
    .space-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .space-chips::-webkit-scrollbar { display: none; }
    .space-chip {
      white-space: nowrap; flex: none;
      background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
      border-radius: 999px; padding: 7px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    }
    .space-chip.active { background: var(--acid); color: #10130a; border-color: var(--acid); }

    .space-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .space-head .sname { font-size: 1.15rem; font-weight: 800; }
    .space-head .sname .hash { color: var(--muted); font-weight: 600; }
    .new-post {
      background: var(--acid); color: #10130a; border: none; border-radius: 999px;
      padding: 8px 14px; font-size: 0.8rem; font-weight: 800; cursor: pointer; flex: none;
    }

    /* Circle post cards */
    .post-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; margin-bottom: 10px;
    }
    .post-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .post-av {
      width: 38px; height: 38px; border-radius: 50%; flex: none;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.82rem; color: #10130a;
    }
    .post-who { min-width: 0; }
    .post-author { font-weight: 700; font-size: 0.9rem; }
    .post-author .role {
      font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--acid); border: 1px solid var(--acid); border-radius: 999px; padding: 1px 6px; margin-left: 6px;
    }
    .post-meta { color: var(--muted); font-size: 0.72rem; margin-top: 1px; }
    .post-title { font-weight: 700; font-size: 1rem; margin: 2px 0 5px; line-height: 1.3; }
    .post-body { color: var(--chalk); font-size: 0.9rem; line-height: 1.5; opacity: 0.92; }
    .post-foot { display: flex; align-items: center; gap: 18px; margin-top: 12px; }
    .post-foot button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.82rem; display: inline-flex; align-items: center; gap: 6px; padding: 0;
    }
    .post-foot button.liked { color: var(--acid); }
    .post-foot .react:hover { color: var(--chalk); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <div class="brand">WURQ<span class="dot">.</span></div>
      <div class="screen-name">Profile</div>
    </div>

    <div class="content" id="content">
      <!-- rendered by app.js -->
      <p class="subtitle">Loading…</p>
    </div>

    <nav class="nav">
      <a href="#" data-view="log"><span class="ico">▦</span>WOD</a>
      <a href="#" data-view="leaderboard"><span class="ico">≡</span>Board</a>
      <a href="#" data-view="community"><span class="ico">❖</span>Community</a>
      <a href="#" data-view="feed"><span class="ico">✦</span>Feed</a>
      <a href="#" data-view="profile" class="active"><span class="ico">◉</span>Profile</a>
    </nav>

    <div class="toast" id="toast">Saved ✓</div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
